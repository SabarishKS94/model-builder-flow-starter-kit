<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <title>Salesforce</title>
    <link rel="icon" href="./images/salesforce.svg" type="image/svg+xml">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./cosmos-theme.css">
    <link rel="stylesheet" href="./loading.css">
    <script>
        // GH Pages SPA redirect: 404.html writes the intended path to sessionStorage; restore it here.
        (function () {
            try {
                var redirect = sessionStorage.spaRedirect;
                if (redirect) {
                    delete sessionStorage.spaRedirect;
                    if (redirect !== location.pathname + location.search + location.hash) {
                        history.replaceState(null, '', redirect);
                    }
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
</head>
